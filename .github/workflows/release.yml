name: Auto Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 需要写入权限来创建 GitHub Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需要完整的git历史来生成Changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc gcc-mingw-w64-x86-64 libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Verify cross compilers
        run: |
          x86_64-w64-mingw32-gcc --version
          gcc --version

      - name: Run Goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          # 以下是传递给 Goreleaser 的参数
          distribution: goreleaser
          version: "~> v2" # 显式使用 GoReleaser v2 主版本
          args: release --clean # 运行 release 命令，生成发布文件并推送到 GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Goreleaser 需要这个token来创建Release
